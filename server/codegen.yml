schema: src/graphql/schema.ts
generates:
  src/graphql/generated.ts:
    plugins:
      - typescript
      - typescript-resolvers
    config:
      useTypeImports: true
      contextType: ./context.js#GraphQLContext
      scalars:
        DateTime: Date
      mappers:
        User: '@prisma/client#User'
        Book: '@prisma/client#Book'
        Review: '@prisma/client#Review'
        Rating: '@prisma/client#Rating'
        ChatMessage: '@prisma/client#ChatMessage'
